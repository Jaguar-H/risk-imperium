<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="./styles/login.css" />
    <title>Login</title>
  </head>

  <body>
    <form method="post" action="/login">
      <label for="username-input">Username</label>
      <input
        type="text"
        name="username"
        id="username-input"
        placeholder="username"
        required
        maxlength="15"
        minlength="2"
      />
      <button type="submit">Login</button>
    </form>
  </body>
</html>
